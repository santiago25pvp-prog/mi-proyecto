name: "[OpenCode] Dependency and SDK drift"
 
on:
  schedule:
    - cron: "0 16 * * *" # 11:00 AM Colombia (UTC-5) → 16:00 UTC
  workflow_dispatch:
 
jobs:
  dependency-drift:
    runs-on: ubuntu-latest
 
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
 
      - name: Run OpenCode — Dependency and SDK drift
        uses: anomalyco/opencode/github@latest
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        with:
          model: google/gemini-3.1-flash-lite-preview
          github_token: ${{ secrets.GITHUB_TOKEN }}
          agent: build
          prompt: |
            Detect dependency and SDK drift and propose a minimal alignment plan.
 
            Grounding rules:
            - Cite current and target versions from the repo when possible
              (lockfiles, package manifests such as package.json, package-lock.json,
               tsconfig.json, etc.).
            - Do NOT guess versions; if targets are unclear, propose options and
              label them as suggestions.
 
            Steps:
            1. Read package.json and package-lock.json (and any other manifests).
            2. Identify packages that are significantly outdated or have known
               breaking changes in newer versions.
            3. Identify any SDK version mismatches (e.g., TypeScript, Node.js,
               library peer deps).
            4. Produce a minimal, prioritized alignment plan. For each item include:
               - Current version
               - Suggested target version
               - Reason / risk level
            5. If safe minor/patch bumps can be applied automatically, do so on a
               new branch and open a PR. Label speculative changes clearly.
 