name: "[OpenCode] Pre-release check"
 
on:
  schedule:
    - cron: "0 18 * * 4" # Jueves 1:00 PM Colombia (UTC-5) → 18:00 UTC
  workflow_dispatch:
 
jobs:
  pre-release-check:
    runs-on: ubuntu-latest
 
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
 
      - name: Run OpenCode — Pre-release check
        uses: anomalyco/opencode/github@latest
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        with:
          model: google/gemini-3.1-flash-lite-preview
          github_token: ${{ secrets.GITHUB_TOKEN }}
          agent: build
          prompt: |
            Before tagging, verify changelog, migrations, feature flags, and tests.
 
            Grounding rules:
            - Report ONLY what you can confirm from the repo and CI context.
            - If a check cannot be verified, mark it explicitly as "Unknown."
 
            Checklist to verify and report on:
            1. CHANGELOG — Is there a CHANGELOG.md or equivalent? Does it have an
               entry for the upcoming version? If missing or empty, flag it.
            2. MIGRATIONS — Are there any pending database migration files that have
               not been applied or documented? Check for files in common migration
               folders (migrations/, db/migrate/, prisma/migrations/, etc.).
            3. FEATURE FLAGS — List any feature flags that are still hardcoded as
               experimental/disabled. Confirm if they are intended for this release.
            4. TESTS — Check the latest CI run status. Are all test suites passing?
               Note any failing or skipped tests.
            5. SUMMARY — Produce a brief go/no-go recommendation with a bullet list
               of blocking issues (if any) and non-blocking observations.
 
            Open an issue titled "Pre-release check — [date]" with the full report
            so the team can review before tagging.
 